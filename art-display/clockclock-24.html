<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>ClockClock 24</title>
    <style>
      :root {
        --bg: #000000;
        --ink: #e8e6e1;
        --face: #1d1b18;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: var(--bg);
        color: var(--ink);
        font-family: "JetBrains Mono", "IBM Plex Mono", ui-monospace, monospace;
        overflow: hidden;
      }
      #stage {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #grid {
        display: grid;
        grid-template-columns: repeat(4, var(--cell, 80px));
        grid-template-rows: repeat(6, var(--cell, 80px));
      }
      .clock-cell {
        position: relative;
      }
      .clock-face {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: var(--face-d, 67px);
        height: var(--face-d, 67px);
        border-radius: 50%;
        background: var(--face);
        overflow: hidden;
        /* two-layer inset shadow: vignette darkens edges all-round (depth in a well),
           directional layer adds upper-left shadow from the light source */
        box-shadow:
          inset 0 0 var(--vignette-blur, 20px) rgba(0, 0, 0, 0.7),
          inset var(--well-dx, -4px) var(--well-dy, -6px)
            var(--well-blur, 14px) rgba(0, 0, 0, 0.97);
      }
      .hand {
        position: absolute;
        width: var(--hand-w, 7px);
        height: var(--hand-len, 30px);
        background: var(--ink);
        bottom: 50%;
        left: 50%;
        margin-left: calc(var(--hand-w, 7px) / -2);
        transform-origin: 50% 100%;
        /* hand shadow clipped to face via parent overflow:hidden */
        box-shadow: var(--hand-sdx, 2px) var(--hand-sdy, 4px)
          var(--hand-sblur, 4px) rgba(0, 0, 0, 0.9);
        will-change: transform;
      }
      .pivot {
        position: absolute;
        width: var(--pivot-d, 9px);
        height: var(--pivot-d, 9px);
        border-radius: 50%;
        background: var(--ink);
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 2;
      }
      .chrome {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        padding: 20px 28px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: var(--ink);
        pointer-events: none;
        transition: opacity 200ms ease;
      }
      .chrome.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .chrome .group {
        display: flex;
        gap: 24px;
        pointer-events: auto;
      }
      .chrome .brand {
        pointer-events: auto;
      }
      .chrome .brand .muted {
        opacity: 0.5;
      }
      .btn-group {
        display: flex;
        gap: 2px;
      }
      .btn {
        background: transparent;
        color: var(--ink);
        border: 1px solid var(--ink);
        padding: 6px 12px;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        font-family: inherit;
        cursor: pointer;
      }
      .btn.active {
        background: var(--ink);
        color: var(--bg);
      }
      .hint {
        position: fixed;
        bottom: 18px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.3em;
        color: var(--ink);
        opacity: 0.4;
        pointer-events: none;
        transition: opacity 200ms ease;
      }
      .hint.hidden {
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <div id="grid"></div>
    </div>

    <div class="chrome" id="chrome">
      <div class="brand">
        <span class="muted">ClockClock&nbsp;24&nbsp;/&nbsp;</span>
        <span id="modeLabel">minimal</span>
      </div>
      <div class="group">
        <div class="btn-group" data-control="mode">
          <button class="btn active" data-value="minimal">minimal</button>
          <button class="btn" data-value="medium">medium</button>
          <button class="btn" data-value="elaborate">elaborate</button>
        </div>
        <div class="btn-group" data-control="hour">
          <button class="btn active" data-value="12">12H</button>
          <button class="btn" data-value="24">24H</button>
        </div>
      </div>
    </div>

    <div class="hint" id="hint">Click anywhere to hide controls</div>

    <script>
      (() => {
        "use strict";

        // ─────────────────────────────────────────────────────────────────────────
        // EASING
        // ─────────────────────────────────────────────────────────────────────────
        const easeInOutCubic = (t) =>
          t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        const easeInOutQuint = (t) =>
          t < 0.5 ? 16 * t * t * t * t * t : 1 - Math.pow(-2 * t + 2, 5) / 2;

        // ─────────────────────────────────────────────────────────────────────────
        // DIGIT MAP
        // ─────────────────────────────────────────────────────────────────────────
        const U = 0;
        const R = Math.PI / 2;
        const D = Math.PI;
        const L = -Math.PI / 2;
        const OFF = (5 * Math.PI) / 4;

        const DIGITS = {
          0: [
            [R, D],
            [L, D],
            [U, D],
            [U, D],
            [U, R],
            [U, L],
          ],
          1: [
            [D, D],
            [D, D],
            [U, D],
            [U, D],
            [U, U],
            [U, U],
          ],
          2: [
            [R, D],
            [L, D],
            [U, R],
            [L, D],
            [U, R],
            [L, L],
          ],
          3: [
            [R, D],
            [L, D],
            [R, D],
            [L, D],
            [U, R],
            [L, L],
          ],
          4: [
            [U, D],
            [U, D],
            [U, R],
            [L, D],
            [U, U],
            [U, U],
          ],
          5: [
            [R, D],
            [L, L],
            [U, R],
            [L, D],
            [U, R],
            [L, L],
          ],
          6: [
            [R, D],
            [L, L],
            [U, R],
            [L, D],
            [U, R],
            [U, L],
          ],
          7: [
            [R, D],
            [L, D],
            [U, U],
            [U, U],
            [U, U],
            [U, U],
          ],
          8: [
            [R, D],
            [L, D],
            [U, R],
            [U, L],
            [U, R],
            [U, L],
          ],
          9: [
            [R, D],
            [L, D],
            [U, R],
            [U, L],
            [U, R],
            [L, L],
          ],
          " ": [
            [OFF, OFF],
            [OFF, OFF],
            [OFF, OFF],
            [OFF, OFF],
            [OFF, OFF],
            [OFF, OFF],
          ],
        };

        // ─────────────────────────────────────────────────────────────────────────
        // GRID CONFIG — 4 cols × 6 rows = 24 clocks (portrait: HH over MM)
        // ─────────────────────────────────────────────────────────────────────────
        const COLS = 4;
        const ROWS = 6;
        const TOTAL_CLOCKS = COLS * ROWS;
        const TOTAL_HANDS = TOTAL_CLOCKS * 2;

        function timeToTargets(hh, mm) {
          const digits = [hh[0], hh[1], mm[0], mm[1]];
          const targets = new Array(TOTAL_HANDS);
          for (let d = 0; d < 4; d++) {
            const shape = DIGITS[digits[d]] || DIGITS[" "];
            const rowBand = d < 2 ? 0 : 1;
            const colBand = d % 2;
            for (let localRow = 0; localRow < 3; localRow++) {
              for (let localCol = 0; localCol < 2; localCol++) {
                const localIdx = localRow * 2 + localCol;
                const gridRow = rowBand * 3 + localRow;
                const gridCol = colBand * 2 + localCol;
                const clockIdx = gridRow * COLS + gridCol;
                const [a, b] = shape[localIdx];
                targets[clockIdx * 2] = a;
                targets[clockIdx * 2 + 1] = b;
              }
            }
          }
          return targets;
        }

        function shortestDelta(from, to) {
          let d = (to - from) % (2 * Math.PI);
          if (d > Math.PI) d -= 2 * Math.PI;
          if (d < -Math.PI) d += 2 * Math.PI;
          return d;
        }

        // ─────────────────────────────────────────────────────────────────────────
        // CHOREOGRAPHER
        // ─────────────────────────────────────────────────────────────────────────
        function applyChoreography(hands, targets, mode, now) {
          for (let i = 0; i < hands.length; i++) {
            const h = hands[i];
            const clockIdx = Math.floor(i / 2);
            const col = clockIdx % COLS;
            const row = Math.floor(clockIdx / COLS);

            let duration, delay, easing, extraRotations, direction;
            if (mode === "minimal") {
              duration = 1800;
              delay = 0;
              easing = easeInOutCubic;
              extraRotations = 0;
              direction = 0;
            } else if (mode === "medium") {
              duration = 2400;
              delay = row * 110 + col * 40;
              easing = easeInOutCubic;
              extraRotations = 1;
              direction = i % 2 === 0 ? 1 : -1;
            } else {
              duration = 3600;
              delay = (row * 2 + col) * 80 + (i % 2) * 30;
              easing = easeInOutQuint;
              extraRotations = 2;
              direction = i % 2 === 0 ? 1 : -1;
            }

            const shortest = shortestDelta(h.current, targets[i]);
            let totalDelta;
            if (direction === 0) {
              totalDelta = shortest;
            } else {
              const base =
                direction === 1
                  ? shortest > 0
                    ? shortest
                    : shortest + 2 * Math.PI
                  : shortest < 0
                    ? shortest
                    : shortest - 2 * Math.PI;
              totalDelta = base + direction * extraRotations * 2 * Math.PI;
            }

            h.start = h.current;
            h.target = h.current + totalDelta;
            h.t0 = now + delay;
            h.duration = duration;
            h.easing = easing;
          }
        }

        // ─────────────────────────────────────────────────────────────────────────
        // SHADOW RATIOS (same values as canvas version)
        // ─────────────────────────────────────────────────────────────────────────
        const WELL_SHADOW_DX_RATIO = -0.07;
        const WELL_SHADOW_DY_RATIO = -0.10;
        const WELL_SHADOW_BLUR_RATIO = 0.22;
        const HAND_SHADOW_DX_RATIO = 0.03;
        const HAND_SHADOW_DY_RATIO = 0.045;
        const HAND_SHADOW_BLUR_RATIO = 0.05;

        // ─────────────────────────────────────────────────────────────────────────
        // DOM SETUP
        // ─────────────────────────────────────────────────────────────────────────
        const grid = document.getElementById("grid");
        const handEls = [];

        for (let i = 0; i < TOTAL_CLOCKS; i++) {
          const cellEl = document.createElement("div");
          cellEl.className = "clock-cell";

          const faceEl = document.createElement("div");
          faceEl.className = "clock-face";

          for (let j = 0; j < 2; j++) {
            const handEl = document.createElement("div");
            handEl.className = "hand";
            faceEl.appendChild(handEl);
            handEls.push(handEl);
          }

          const pivotEl = document.createElement("div");
          pivotEl.className = "pivot";
          faceEl.appendChild(pivotEl);

          cellEl.appendChild(faceEl);
          grid.appendChild(cellEl);
        }

        // Set initial OFF position so there's no flash before the first rAF tick
        for (const el of handEls) {
          el.style.transform = `rotate(${OFF}rad)`;
        }

        // ─────────────────────────────────────────────────────────────────────────
        // TIME
        // ─────────────────────────────────────────────────────────────────────────
        function currentTimeKey(hour24) {
          const d = new Date();
          let h = d.getHours();
          const m = d.getMinutes();
          if (!hour24) {
            h = h % 12;
            if (h === 0) h = 12;
          }
          return String(h).padStart(2, "0") + ":" + String(m).padStart(2, "0");
        }

        // ─────────────────────────────────────────────────────────────────────────
        // INIT
        // ─────────────────────────────────────────────────────────────────────────
        const state = {
          mode: "minimal",
          hour24: false,
          hands: Array.from({ length: TOTAL_HANDS }, () => ({
            current: OFF,
            start: OFF,
            target: OFF,
            t0: 0,
            duration: 1,
            easing: easeInOutCubic,
          })),
          lastTimeKey: "",
          rafId: null,
        };

        function resize() {
          const w = window.innerWidth;
          const h = window.innerHeight;
          const margin = 0.08;
          const cell = Math.min(
            (w * (1 - margin * 2)) / COLS,
            (h * (1 - margin * 2)) / ROWS,
          );
          const radius = cell * 0.42;

          const root = document.documentElement;
          root.style.setProperty("--cell", `${cell}px`);
          root.style.setProperty("--face-d", `${radius * 2}px`);
          root.style.setProperty(
            "--hand-w",
            `${Math.max(4, cell * 0.09)}px`,
          );
          root.style.setProperty("--hand-len", `${radius * 0.9}px`);
          root.style.setProperty(
            "--pivot-d",
            `${Math.max(2, cell * 0.055) * 2}px`,
          );
          root.style.setProperty(
            "--well-dx",
            `${cell * WELL_SHADOW_DX_RATIO}px`,
          );
          root.style.setProperty(
            "--well-dy",
            `${cell * WELL_SHADOW_DY_RATIO}px`,
          );
          root.style.setProperty(
            "--well-blur",
            `${cell * WELL_SHADOW_BLUR_RATIO}px`,
          );
          root.style.setProperty(
            "--vignette-blur",
            `${radius * 0.65}px`,
          );
          root.style.setProperty(
            "--hand-sdx",
            `${cell * HAND_SHADOW_DX_RATIO}px`,
          );
          root.style.setProperty(
            "--hand-sdy",
            `${cell * HAND_SHADOW_DY_RATIO}px`,
          );
          root.style.setProperty(
            "--hand-sblur",
            `${cell * HAND_SHADOW_BLUR_RATIO}px`,
          );
        }

        resize();
        window.addEventListener("resize", resize);

        // Initial choreography: from OFF to current time
        (() => {
          const now = performance.now();
          const key = currentTimeKey(state.hour24);
          state.lastTimeKey = key;
          const [hh, mm] = key.split(":");
          const targets = timeToTargets(hh, mm);
          applyChoreography(state.hands, targets, state.mode, now + 400);
        })();

        function tick(now) {
          const key = currentTimeKey(state.hour24);
          if (key !== state.lastTimeKey) {
            state.lastTimeKey = key;
            const [hh, mm] = key.split(":");
            const targets = timeToTargets(hh, mm);
            applyChoreography(state.hands, targets, state.mode, now);
          }

          for (let i = 0; i < state.hands.length; i++) {
            const h = state.hands[i];
            const elapsed = now - h.t0;
            if (elapsed <= 0) {
              h.current = h.start;
            } else if (elapsed >= h.duration) {
              h.current = h.target;
            } else {
              const p = h.easing(elapsed / h.duration);
              h.current = h.start + (h.target - h.start) * p;
            }
            handEls[i].style.transform = `rotate(${h.current}rad)`;
          }

          state.rafId = requestAnimationFrame(tick);
        }
        state.rafId = requestAnimationFrame(tick);

        document.addEventListener("visibilitychange", () => {
          if (document.hidden) {
            if (state.rafId) cancelAnimationFrame(state.rafId);
          } else {
            for (const h of state.hands) h.current = h.target;
            state.lastTimeKey = "";
            state.rafId = requestAnimationFrame(tick);
          }
        });

        // ─────────────────────────────────────────────────────────────────────────
        // CHROME
        // ─────────────────────────────────────────────────────────────────────────
        const chrome = document.getElementById("chrome");
        const hint = document.getElementById("hint");
        const modeLabel = document.getElementById("modeLabel");

        function setActive(groupEl, value) {
          groupEl.querySelectorAll(".btn").forEach((b) => {
            b.classList.toggle("active", b.dataset.value === value);
          });
        }

        document
          .querySelectorAll('[data-control="mode"] .btn')
          .forEach((btn) => {
            btn.addEventListener("click", (e) => {
              e.stopPropagation();
              state.mode = btn.dataset.value;
              modeLabel.textContent = state.mode;
              setActive(btn.parentElement, state.mode);
            });
          });

        document
          .querySelectorAll('[data-control="hour"] .btn')
          .forEach((btn) => {
            btn.addEventListener("click", (e) => {
              e.stopPropagation();
              state.hour24 = btn.dataset.value === "24";
              setActive(btn.parentElement, btn.dataset.value);
              state.lastTimeKey = ""; // force re-trigger on next tick
            });
          });

        document.body.addEventListener("click", () => {
          const hidden = chrome.classList.toggle("hidden");
          hint.classList.toggle("hidden", hidden);
          if (hidden) {
            if (!document.fullscreenElement) {
              document.documentElement.requestFullscreen?.().catch(() => {});
            }
          } else {
            if (document.fullscreenElement) {
              document.exitFullscreen?.().catch(() => {});
            }
          }
        });

        document.addEventListener("fullscreenchange", () => {
          if (
            !document.fullscreenElement &&
            chrome.classList.contains("hidden")
          ) {
            chrome.classList.remove("hidden");
            hint.classList.remove("hidden");
          }
        });
      })();
    </script>
  </body>
</html>
